<!DOCTYPE html>
<html>
<head>
    <title>Admission Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-300 flex justify-center items-center h-screen">

<form class="bg-white p-5 rounded-lg w-80">
    <h2 class="text-center font-bold mb-3">Admission Form</h2>

    <input id="name" placeholder="Name" oninput="checkName()" class="w-full border p-2 mb-1">
    <p id="nameError" class="text-red-500 text-sm"></p>

    <input id="email" placeholder="Email" oninput="checkEmail()" class="w-full border p-2 mt-2 mb-1">
    <p id="emailError" class="text-red-500 text-sm"></p>

    <input id="mobile" placeholder="Mobile" oninput="checkMobile()" class="w-full border p-2 mt-2 mb-1">
    <p id="mobileError" class="text-red-500 text-sm"></p>

    <input type="date" id="dob" oninput="checkDob()" class="w-full border p-2 mt-2 mb-1">
    <p id="dobError" class="text-red-500 text-sm"></p>

    <input type="password" id="password" placeholder="Password" oninput="checkPassword()" class="w-full border p-2 mt-2 mb-1">
    <p id="passwordError" class="text-red-500 text-sm"></p>
    <p id="strength" class="text-sm"></p>

    <input type="password" id="confirm" placeholder="Confirm Password" oninput="checkConfirm()" class="w-full border p-2 mt-2 mb-1">
    <p id="confirmError" class="text-red-500 text-sm"></p>

    <button id="btn" type="button" class="w-full p-2 mt-3 rounded-lg bg-gray-500 text-white" disabled>
        Submit
    </button>
</form>

<script src="script.js"></script>
</body>
</html>
